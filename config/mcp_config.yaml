# 游戏王查卡 MCP 服务器配置文件

# MCP服务器配置
mcp:
  # 服务器名称
  server_name: "ygo-card-query-mcp"
  # 工具列表
  tools:
    - name: "query_card"
      description: "查询游戏王卡片信息"

# 卡片查询配置（MCP服务器使用）
card_query:
  # 最大返回结果数
  max_results: 10

# 数据库配置（MCP服务器使用）
database:
  # 数据库目录路径
  db_dir: "ygopro_database"
  # 数据库文件路径（相对于db_dir）
  cdb_path: "locales/zh-CN/cards.cdb"
  # 备用数据库文件路径
  fallback_cdb_path: "cards.cdb"
