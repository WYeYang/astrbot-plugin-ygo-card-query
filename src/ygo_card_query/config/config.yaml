# 游戏王查卡插件配置文件

# 数据库配置
database:
  # 数据库目录路径
  db_dir: "ygopro_database"
  # 数据库更新源
  git_repo: "https://github.com/moecube/ygopro-database.git"
  # 数据库文件路径（相对于db_dir）
  cdb_path: "locales/zh-CN/cards.cdb"
  # 备用数据库文件路径
  fallback_cdb_path: "cards.cdb"

# 卡片查询配置
card_query:
  # 默认查询语句
  default_sql: "SELECT d.id, t.name, d.type, d.attribute, d.level, d.race, d.atk, d.def, t.desc, d.ot FROM datas d JOIN texts t ON d.id = t.id"
  # 最大返回结果数
  max_results: 10
  # 卡片图片URL模板
  image_url_template: "https://cdn.233.momobako.com/ygopro/pics/{card_id}.jpg"

# MCP服务器配置
mcp:
  # 服务器名称
  server_name: "ygo-card-query-mcp"
  # 工具列表
  tools:
    - name: "query_card"
      description: "查询游戏王卡片信息"

# 日志配置
logging:
  # 日志级别 (debug, info, warning, error)
  level: "info"
